name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: CI
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:4-management@sha256:76412b1ed2865b88ed01b4a504f72e888842f2089a7527743d325ce7c9d3a43b
        ports:
          - "5672:5672"
          - "15672:15672"
        options: >-
          --health-cmd "rabbitmq-diagnostics -q check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RABBITMQ_URL: amqp://guest:guest@localhost:5672
      RABBITMQ_MANAGEMENT_URL: http://guest:guest@localhost:15672
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Tests
        run: |
          go test -race -tags integration -coverprofile=coverage.txt -covermode=atomic -coverpkg="$(go list ./... | grep -v /cmd/ | tr '\n' , | sed 's/,$//')" ./...
          go tool cover -func=coverage.txt
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          files: ./coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
      - run: go vet ./...
      - name: Build TCK adapter
        run: go build ./cmd/tck-adapter/
