name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: CI
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:4-management@sha256:4a2be7ea53fab8a1b662d2d1426e6410b8beafc5d1a00247192e262938c656b7
        ports:
          - "5672:5672"
          - "15672:15672"
        options: >-
          --health-cmd "rabbitmq-diagnostics -q check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RABBITMQ_URL: amqp://guest:guest@localhost:5672
      RABBITMQ_MANAGEMENT_URL: http://guest:guest@localhost:15672
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
      - name: Tests
        run: |
          go test -race -tags integration -coverprofile=coverage.txt -covermode=atomic -coverpkg="$(go list ./... | grep -v /cmd/ | tr '\n' , | sed 's/,$//')" ./...
          go tool cover -func=coverage.txt
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: ./coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
      - run: go vet ./...
      - name: Build TCK adapter
        run: go build ./cmd/tck-adapter/
